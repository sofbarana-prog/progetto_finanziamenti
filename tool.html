<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Questionario Progetto — Tool call</title>
  <style>
    :root {
      --max-width: 1100px;
      --gap: 12px;
      font-family: system-ui, Arial, sans-serif;
    }

    body {
      margin: 24px;
      display: flex;
      justify-content: center;
      background: #fafafa;
    }

    .page {
      width: 100%;
      max-width: var(--max-width);
    }

    h1 {
      margin: 0 0 12px 0;
    }

    fieldset {
      border: 1px solid #e6e6e6;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 14px;
      background: #fff;
    }

    legend {
      font-weight: 700;
      padding: 0 8px;
    }

    label {
      display: block;
      margin-top: 8px;
      font-weight: 600;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      align-items: start;
    }

    select, input[type="text"], textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      background: white;
    }

    .radio {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .radio label {
      font-weight: 500;
      margin: 0;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 0;
      background: #2b7cff;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .secondary {
      background: #777;
    }

    .box {
      background: #f7f7f7;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #e9e9e9;
      margin-bottom: 12px;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #ddd;
      margin-right: 8px;
      margin-bottom: 6px;
      font-size: 0.9rem;
      background: white;
    }

    .calls {
      margin-top: 14px;
    }

    .call {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: white;
    }

    .call h3 {
      margin: 0 0 6px 0;
      font-size: 1rem;
    }

    .meta {
      color: #555;
      font-size: 0.95rem;
      margin-top: 6px;
      word-break: break-word;
    }

    .muted {
      color: #666;
      font-size: 0.9rem;
    }

    .error {
      color: #b30000;
    }

    footer {
      margin-top: 18px;
      color: #666;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Questionario Progetto — Tool call</h1>

    <form id="survey">
      <fieldset>
        <legend>1) Timeframe di chiusura del progetto</legend>
        <div class="row">
          <div>
            <label for="closure_year">Anno di chiusura</label>
            <select id="closure_year" name="closure_year" required>
              <option value="" selected disabled>Seleziona…</option>
              <option value="2026">2026</option>
              <option value="2027">2027</option>
              <option value="2028">2028</option>
            </select>
          </div>

          <div>
            <label for="closure_quarter">Quadrimestre</label>
            <select id="closure_quarter" name="closure_quarter" required>
              <option value="" selected disabled>Seleziona…</option>
              <option value="Q1">Q1</option>
              <option value="Q2">Q2</option>
              <option value="Q3">Q3</option>
              <option value="Q4">Q4</option>
            </select>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>2) Natura del progetto</legend>

        <label>Tipologia ricerca</label>
        <div class="radio">
          <label><input type="radio" name="project_nature" value="basic" required> Basic research</label>
          <label><input type="radio" name="project_nature" value="applied"> Applied research</label>
          <label><input type="radio" name="project_nature" value="industrial"> Industrial research</label>
        </div>

        <label for="horizon_cluster">Cluster di Horizon Europe</label>
        <select id="horizon_cluster" name="horizon_cluster" required>
          <option value="" selected disabled>Seleziona…</option>
          <option>Cluster 1: Health</option>
          <option>Cluster 2: Culture, Creativity and Inclusive Society</option>
          <option>Cluster 3: Civil Security for Society</option>
          <option>Cluster 4: Digital, Industry and Space</option>
          <option>Cluster 5: Climate, Energy and Mobility</option>
          <option>Cluster 6: Food, Bioeconomy, Natural Resources, Agriculture and Environment</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>3) Tipo di azione</legend>
        <label for="action_type">Seleziona il tipo di azione</label>
        <select id="action_type" name="action_type">
          <option value="">Qualsiasi</option>
          <option value="IA">Innovation Action (IA)</option>
          <option value="RIA">Research and Innovation Action (RIA)</option>
          <option value="CSA">Coordination and Support Action (CSA)</option>
          <option value="COFUND">COFUND</option>
          <option value="OTHER">Altro / non specificato</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>4) Beneficiario di altri schemi</legend>
        <label for="other_schemes">Il progetto è già beneficiario di altri schemi?</label>
        <select id="other_schemes" name="other_schemes" required>
          <option value="" selected disabled>Seleziona…</option>
          <option value="yes">Sì</option>
          <option value="no">No</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>5) Tipologia partner</legend>
        <label for="partner_type">Partner principale / tipologia</label>
        <select id="partner_type" name="partner_type" required>
          <option value="" selected disabled>Seleziona…</option>
          <option value="research">Research organisation</option>
          <option value="sme">SME</option>
          <option value="large">Large enterprise</option>
        </select>
      </fieldset>

      <div style="display:flex; gap:12px; margin-top:8px; align-items:center;">
        <button type="submit">Genera suggerimento call</button>
        <button type="button" id="resetBtn" class="secondary">Pulisci</button>
      </div>
    </form>

    <section class="calls" id="results" aria-live="polite" style="margin-top:18px;"></section>

    <footer>
      Per pubblicarlo online, carica questo file insieme a <code>calls.json</code> su GitHub Pages, Netlify o Vercel.
    </footer>
  </div>

<script>
(async function(){
  const form = document.getElementById('survey');
  const results = document.getElementById('results');
  const resetBtn = document.getElementById('resetBtn');

  let CALLS = [];

  async function loadCalls(){
    // Modalità 1: dataset incorporato direttamente nella pagina
    if (Array.isArray(window.CALLS_DATA)) {
      return window.CALLS_DATA;
    }

    // Modalità 2: file calls.json nella stessa cartella
    try {
      const res = await fetch('./calls.json', { cache: 'no-store' });
      const data = await res.json();
      return Array.isArray(data.calls) ? data.calls : [];
    } catch (e) {
      console.error(e);
      return [];
    }
  }

  CALLS = await loadCalls();

  function escapeHtml(s){
    if(!s) return '';
    return String(s).replace(/[&<>"']/g, m => (
      {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]
    ));
  }

  function clusterNumFromSelect(v){
    const m = String(v || '').match(/Cluster\s+(\d+)/i);
    return m ? m[1] : '';
  }

  function partnerTypeToBeneficiary(v){
    if(v === 'research') return 'Research organisation';
    if(v === 'sme') return 'SME';
    if(v === 'large') return 'Large enterprise';
    return '';
  }

  function quarterCutoff(year, quarter){
    if(!year || !quarter) return null;
    const map = {
      Q1: `${year}-03-31`,
      Q2: `${year}-06-30`,
      Q3: `${year}-09-30`,
      Q4: `${year}-12-31`
    };
    return new Date(map[quarter]);
  }

  function parseLooseDate(s){
    if(!s) return null;

    let d = new Date(s);
    if(!isNaN(d)) return d;

    const m = String(s).match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
    if(m){
      const months = {
        january:0,february:1,march:2,april:3,may:4,june:5,
        july:6,august:7,september:8,october:9,november:10,december:11
      };
      const day = parseInt(m[1], 10);
      const month = months[m[2].toLowerCase()];
      const year = parseInt(m[3], 10);
      if(month !== undefined){
        return new Date(year, month, day);
      }
    }
    return null;
  }

  function scoreCall(call, answers){
    let score = 0;

    const wantedCluster = clusterNumFromSelect(answers.horizon_cluster);
    const wantedBeneficiary = partnerTypeToBeneficiary(answers.partner_type);
    const cutoff = quarterCutoff(answers.closure_year, answers.closure_quarter);
    const wantedAction = answers.action_type || '';

    if (wantedCluster && call.cluster_num === wantedCluster) {
      score += 50;
    }

    if (wantedAction) {
      const action = (call.action || '').toUpperCase();
      if (wantedAction === 'OTHER') {
        if (!action || !['IA','RIA','CSA','COFUND'].includes(action)) score += 40;
      } else if (action === wantedAction) {
        score += 40;
      }
    }

    if (answers.project_nature === 'basic') {
      if (call.action === 'RIA') score += 30;
      if (call.action === 'CSA') score += 20;
    } else if (answers.project_nature === 'applied') {
      if (call.action === 'RIA') score += 20;
      if (call.action === 'IA') score += 20;
    } else if (answers.project_nature === 'industrial') {
      if (call.action === 'IA') score += 30;
    }

    if (wantedBeneficiary && Array.isArray(call.beneficiary_hint)) {
      if (call.beneficiary_hint.includes(wantedBeneficiary)) {
        score += 20;
      }
    }

    if (answers.other_schemes === 'no') {
      score += 5;
    }

    if (cutoff && call.deadline) {
      const deadline = parseLooseDate(call.deadline);
      if (deadline && deadline <= cutoff) {
        score += 15;
      }
    }

    return score;
  }

  function filterCalls(answers){
    const wantedCluster = clusterNumFromSelect(answers.horizon_cluster);
    const wantedAction = answers.action_type || '';

    let out = CALLS.map(c => ({
      ...c,
      _score: scoreCall(c, answers)
    }));

    if (wantedCluster) {
      out = out.filter(c => !c.cluster_num || c.cluster_num === wantedCluster);
    }

    if (wantedAction) {
      out = out.filter(c => {
        const action = (c.action || '').toUpperCase();
        if (wantedAction === 'OTHER') {
          return !action || !['IA','RIA','CSA','COFUND'].includes(action);
        }
        return action === wantedAction;
      });
    }

    out = out
      .filter(c => c._score > 0)
      .sort((a, b) => {
        if (b._score !== a._score) return b._score - a._score;
        return (a.deadline || '').localeCompare(b.deadline || '');
      });

    return out.slice(0, 30);
  }

  function renderResults(answers, filtered){
    const pills = [
      `Chiusura: ${answers.closure_year || ''} ${answers.closure_quarter || ''}`,
      `Natura: ${answers.project_nature || ''}`,
      `Cluster: ${answers.horizon_cluster || ''}`,
      `Tipo di azione: ${answers.action_type || 'Qualsiasi'}`,
      `Altri schemi: ${answers.other_schemes || ''}`,
      `Partner: ${answers.partner_type || ''}`
    ].map(t => `<span class="pill">${escapeHtml(t)}</span>`).join(' ');

    let html = `<div class="box"><strong>Riepilogo risposte</strong><div style="margin-top:8px">${pills}</div></div>`;

    if (!CALLS.length) {
      html += `<div class="box error">
        Non trovo dati da mostrare. Carica <code>calls.json</code> nella stessa cartella del file HTML
        oppure incorpora i dati in <code>window.CALLS_DATA</code>.
      </div>`;
      results.innerHTML = html;
      return;
    }

    html += `<div class="box muted">
      Nota: il filtro per beneficiario è ancora euristico, perché questo dato non è sempre presente in modo strutturato nei dati di partenza.
    </div>`;

    html += `<h2 style="margin-top:14px;">Call suggerite</h2>`;

    if (!filtered.length) {
      html += `<div class="box">Nessuna call trovata con questi criteri.</div>`;
      results.innerHTML = html;
      return;
    }

    filtered.forEach(c => {
      const meta = [
        c.programme ? `Programme: ${c.programme}` : '',
        c.action ? `Type of action: ${c.action}` : '',
        c.cluster_num ? `Cluster: ${c.cluster_num}` : '',
        c.opening ? `Opening: ${c.opening}` : '',
        c.deadline ? `Deadline: ${c.deadline}` : '',
        c.budget ? `Budget: ${c.budget}` : '',
        c.record_type ? `Record: ${c.record_type}` : '',
        `Score: ${c._score}`
      ].filter(Boolean).join(' · ');

      html += `<div class="call">
        <h3>${escapeHtml(c.name || '(senza nome)')}</h3>
        <div class="meta">${escapeHtml(meta)}</div>
        ${c.url ? `<div class="meta">Link: <a href="${encodeURI(c.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(c.url)}</a></div>` : ''}
      </div>`;
    });

    results.innerHTML = html;
    results.scrollIntoView({behavior:'smooth'});
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();

    const fd = new FormData(form);
    const answers = {
      closure_year: fd.get('closure_year'),
      closure_quarter: fd.get('closure_quarter'),
      project_nature: fd.get('project_nature'),
      horizon_cluster: fd.get('horizon_cluster'),
      action_type: fd.get('action_type'),
      other_schemes: fd.get('other_schemes'),
      partner_type: fd.get('partner_type')
    };

    const filtered = filterCalls(answers);
    renderResults(answers, filtered);
  });

  resetBtn.addEventListener('click', function(){
    form.reset();
    results.innerHTML = '';
  });
})();
</script>
</body>
</html>
